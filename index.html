<!DOCTYPE html>
<html>
<head>
    <title>IMVU Party Guide</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background: #121212; color: white; font-family: sans-serif; margin: 0; padding: 20px; }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #333; padding-bottom: 10px; }
        .clock { color: #00d4ff; font-weight: bold; font-size: 1.2rem; }
        
        .lane-title { background: #333; padding: 10px; margin-top: 20px; border-radius: 5px; font-weight: bold; }
        .official-lane { border-left: 5px solid #FFD700; }
        .community-lane { border-left: 5px solid #00d4ff; }
        
        .party-card { background: #1e1e1e; margin: 10px 0; padding: 15px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .btn-join { background: #8e44ad; color: white; border: none; padding: 10px 20px; border-radius: 5px; text-decoration: none; cursor: pointer; }
        
        /* Mobile adjustment */
        @media (max-width: 600px) {
            .party-card { flex-direction: column; align-items: flex-start; }
            .btn-join { margin-top: 10px; width: 100%; text-align: center; }
        }
    </style>
</head>
<body>

<header>
    <h1>IMVU PARTY GUIDE</h1>
    <div class="clock" id="ptClock">--:-- -- PT</div>
</header>

<div class="lane-title official-lane">OFFICIAL VUI EVENTS</div>
<div id="officialList"></div>

<div class="lane-title community-lane">COMMUNITY PARTIES</div>
<div id="communityList"></div>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbzRQSTpGVFo0spbCUGxrXKgWAciAgRm1Lb45zQ5mAqzLA9b8chHHMwhtXaa0GNBmtO7gA/exec';

    // Update PT Clock
    function updateClock() {
        const now = new Date();
        const ptTime = now.toLocaleTimeString('en-US', { timeZone: 'America/Los_Angeles', hour: '2-digit', minute: '2-digit' });
        document.getElementById('ptClock').innerText = ptTime + ' PT';
    }
    setInterval(updateClock, 1000);

    // Fetch Parties from Google Sheets
    async function fetchParties() {
        const response = await fetch(API_URL);
        const data = await response.json();
        
        const officialDiv = document.getElementById('officialList');
        const communityDiv = document.getElementById('communityList');

        data.forEach(party => {
            const card = `
                <div class="party-card">
                    <div>
                        <strong>${party.time}</strong> | ${party.title}<br>
                        <small>Host: ${party.host}</small>
                    </div>
                    <a href="${party.link}" class="btn-join">JOIN ROOM</a>
                </div>
            `;
            if (party.category === 'Official') {
                officialDiv.innerHTML += card;
            } else {
                communityDiv.innerHTML += card;
            }
        });
    }

    fetchParties();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMVU Party Guide</title>
    <style>
        :root { --vui-gold: #f1c40f; --vui-purple: #8e44ad; --community-blue: #00d4ff; --bg-dark: #0f0f0f; --card-bg: #1a1a1a; }
        body { background-color: var(--bg-dark); color: #e0e0e0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 10px; text-align: left; }
        
        header { 
            position: relative; height: 140px; display: flex; align-items: flex-end; 
            border-radius: 15px; overflow: hidden; margin-bottom: 15px; background: #000; 
            border: 1px solid rgba(255,255,255,0.05);
        }
        .header-bg { position: absolute; width: 100%; height: 100%; background-image: url('https://raw.githubusercontent.com/MugzLord/imvu-calendar/main/Party%20Banner.jpg'); background-size: cover; background-position: center; opacity: 0.6; }
        .header-overlay { position: absolute; width: 100%; height: 100%; background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 100%); }
        .header-content { position: relative; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 0 15px 10px; z-index: 3; }
        
        .clock { color: var(--community-blue); font-weight: bold; font-size: 1.1rem; }
        .btn-submit { background: var(--vui-gold); color: black; border: none; padding: 8px 16px; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 0.9rem; text-transform: uppercase; }

        .category-tabs { display: flex; gap: 8px; margin-bottom: 15px; }
        .tab-btn { flex: 1; background: #1a1a1a; color: #888; border: 1px solid #333; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 0.8rem; transition: all 0.2s; }
        .tab-btn.active.gold-tab { color: var(--vui-gold); border-color: var(--vui-gold); background: rgba(241, 196, 15, 0.1); }
        .tab-btn.active.blue-tab { color: var(--community-blue); border-color: var(--community-blue); background: rgba(0, 212, 255, 0.1); }

        .party-card { 
            background: var(--card-bg); padding: 12px; border-radius: 15px; 
            display: flex; justify-content: space-between; align-items: center; 
            border-left: 5px solid #444; margin-bottom: 8px; gap: 10px; text-align: left;
        }
        .official-card { border-left-color: var(--vui-gold); }
        .community-card { border-left-color: var(--community-blue); }

        .live-badge {
            background: #ff0000 !important; color: white !important; font-size: 0.6rem;
            padding: 2px 6px; border-radius: 4px; margin-left: 5px; font-weight: bold;
            display: inline-block !important; animation: blinker 1s linear infinite; vertical-align: middle;
        }
        
        @keyframes blinker { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .btn-join { 
            width: 85px !important; min-width: 85px !important; text-align: center; color: white; 
            border: none; padding: 10px 5px; border-radius: 8px; text-decoration: none; 
            font-weight: bold; font-size: 0.8rem; flex-shrink: 0; display: inline-block;
        }

        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:1000; align-items:center; justify-content:center; }
        .modal-content { background:#1e1e1e; padding:20px; border-radius:15px; width:90%; max-width:360px; max-height: 85vh; overflow-y: auto; }
        .modal-content input, .modal-content select { width:100%; margin:8px 0; padding:12px; background:#2a2a2a; color:white; border:1px solid #444; border-radius:8px; box-sizing: border-box; }

        .empty-msg { text-align: center; padding: 60px 20px; color: #444; font-weight: bold; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 0.1em; }
    </style>
</head>
<body>
    <header>
        <div class="header-bg"></div>
        <div class="header-overlay"></div>
        <div class="header-content">
            <h2 style="margin:0; font-size: 1.2rem; font-weight: 900;">IMVU PARTY GUIDE</h2>
            <div style="text-align: right;">
                <div class="clock" id="ptClock">--:-- PT</div>
                <button class="btn-submit" onclick="window.open('https://docs.google.com/forms/d/e/1FAIpQLSctHRAv0mdyL8_gwnB0AIOvVDWtZzwA5UYYo_h_rZ48LBnkNQ/viewform')">+ SUBMIT</button>
            </div>
        </div>
    </header>

    <div class="category-tabs">
        <button id="tabOfficial" class="tab-btn active gold-tab" onclick="switchTab('Official')">Official ✨</button>
        <button id="tabCommunity" class="tab-btn blue-tab" onclick="switchTab('Community')">Community 🎧</button>
    </div>

    <div id="listContainer">
        <div class="empty-msg">Syncing Database...</div>
    </div>

    <!-- SUBMISSION MODAL -->
    <div id="modalOverlay" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle" style="color:var(--vui-gold); margin-top:0; font-weight: 900; text-transform: uppercase;">Submit Party</h2>
            <p style="color: #888; font-size: 0.9rem; margin-bottom: 20px;">Submissions have been moved to the official request form.</p>
            <button class="btn-submit" style="width:100%; padding: 15px;" onclick="window.open('https://docs.google.com/forms/d/e/1FAIpQLSctHRAv0mdyL8_gwnB0AIOvVDWtZzwA5UYYo_h_rZ48LBnkNQ/viewform')">GO TO FORM</button>
            <button onclick="toggleModal()" style="background:none; color:#888; width:100%; border:none; margin-top:10px; font-weight: bold; cursor: pointer;">CANCEL</button>
        </div>
    </div>

    <!-- FIREBASE SDKS -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // =====================================================
        // SECURE FIREBASE CONFIGURATION (HIDDEN FROM GITHUB)
        // Vite will safely inject these during the Railway build
        // =====================================================
        let firebaseConfig;
        let isCanvasPreview = false;
        try {
            // Check for Canvas environment first, then fall back to Vite env variables
            if (typeof __firebase_config !== 'undefined' && __firebase_config) {
                firebaseConfig = JSON.parse(__firebase_config);
                isCanvasPreview = true;
            } else {
                firebaseConfig = {
                    apiKey: import.meta.env.VITE_FIREBASE_API_KEY,
                    authDomain: import.meta.env.VITE_FIREBASE_AUTH_DOMAIN,
                    projectId: import.meta.env.VITE_FIREBASE_PROJECT_ID,
                    storageBucket: import.meta.env.VITE_FIREBASE_STORAGE_BUCKET,
                    messagingSenderId: import.meta.env.VITE_FIREBASE_MESSAGING_SENDER_ID,
                    appId: import.meta.env.VITE_FIREBASE_APP_ID
                };
            }
        } catch(e) {
            console.error("Failed to load environment variables. Ensure Railway has your VITE_ keys set up.");
        }
        
        // Dynamically choose path depending on if it is rendering in Canvas vs Railway
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        const FIREBASE_COLLECTION_PATH = isCanvasPreview ? `artifacts/${appId}/public/data/parties` : 'parties';

        let currentTab = 'Official';
        let allParties = [];

        function updateClock() {
            const options = { timeZone: 'America/Los_Angeles', hour: '2-digit', minute: '2-digit' };
            document.getElementById('ptClock').innerText = new Date().toLocaleTimeString('en-US', options) + ' PT';
        }
        setInterval(updateClock, 1000); updateClock();

        window.switchTab = function(cat) {
            currentTab = cat;
            document.getElementById('tabOfficial').classList.toggle('active', cat === 'Official');
            document.getElementById('tabCommunity').classList.toggle('active', cat === 'Community');
            renderParties();
        }

        function format12h(timeStr) {
            if (!timeStr) return "TBA";
            if (timeStr.includes("AM") || timeStr.includes("PM")) return timeStr;
            let [h, m] = timeStr.split(':').map(Number);
            if (isNaN(h)) return timeStr;
            const ampm = h >= 12 ? 'PM' : 'AM';
            h = h % 12 || 12;
            return `${h}:${String(m).padStart(2, '0')} ${ampm}`;
        }

        function getSortDate(dateStr, timeStr) {
            if (!dateStr) return new Date(0);
            let isoDate = dateStr;
            
            let cleanTime = timeStr || '00:00';
            if (cleanTime.includes('AM') || cleanTime.includes('PM')) {
                let [time, modifier] = cleanTime.split(' ');
                let [hours, minutes] = time.split(':');
                if (hours === '12') hours = '00';
                if (modifier === 'PM') hours = parseInt(hours, 10) + 12;
                cleanTime = `${String(hours).padStart(2, '0')}:${minutes}`;
            }
            return new Date(`${isoDate}T${cleanTime}:00`);
        }

        function renderParties() {
            const container = document.getElementById('listContainer');
            container.innerHTML = "";
            
            const ptNow = new Date(new Date().toLocaleString("en-US", {timeZone: "America/Los_Angeles"}));

            const filteredData = allParties.filter(p => {
                const isPushed = (p.pushedToPublic === true || String(p.pushedToPublic).toLowerCase() === "true");
                const isApproved = p.status === 'approved';
                const isHubOfficial = isPushed && isApproved;
                const isCommunityCat = p.category === 'Community';
                
                if (currentTab === 'Official') {
                    return isHubOfficial;
                } else {
                    return isCommunityCat || (!isHubOfficial && !p.category?.includes('Official'));
                }
            });

            filteredData.sort((a, b) => {
                const da = getSortDate(a.date, a.startTime || a.time);
                const db = getSortDate(b.date, b.startTime || b.time);
                return da - db;
            });

            if (filteredData.length === 0) {
                container.innerHTML = `<div class="empty-msg">NO ${currentTab.toUpperCase()} PARTIES LISTED</div>`;
                return;
            }

            filteredData.forEach(p => {
                const title = p.theme || p.title || "Untitled Party";
                const host = p.coHosts ? `${p.hostName || p.host} + ${p.coHosts}` : (p.hostName || p.host || "Unknown");
                const time = p.startTime || p.time || "00:00";
                const link = p.roomLink || p.link || "";
                const duration = p.duration || 2;

                const startFull = getSortDate(p.date, time);
                const endFull = new Date(startFull.getTime() + (duration * 3600000));
                
                if ((ptNow - endFull) > 24 * 60 * 60 * 1000) return;

                const isLive = (ptNow >= startFull && ptNow <= endFull);
                const isPast = (ptNow > endFull);
                const themeColor = currentTab === 'Official' ? '#f1c40f' : '#00d4ff';

                const card = document.createElement('div');
                card.className = `party-card ${currentTab === 'Official' ? 'official-card' : 'community-card'}`;
                if (isPast) card.style.opacity = "0.5";

                let displayDate = p.date;
                if (p.date && p.date.includes('-') && p.date.length > 5) {
                    const parts = p.date.split('-');
                    if (parts.length === 3) displayDate = `${parts[1]}/${parts[2]}`; 
                }

                let joinBtnHTML = "";
                if (isPast) {
                    joinBtnHTML = `<button class="btn-join" disabled style="background:#222 !important; color:#555 !important; border:1px solid #333;">ENDED</button>`;
                } else if (!link) {
                    joinBtnHTML = `<button class="btn-join" disabled style="background:#333 !important; color:#777 !important; opacity:0.5; border:1px solid #444;">NO LINK</button>`;
                } else {
                    joinBtnHTML = `<a href="${link}" target="_blank" class="btn-join" style="background:${currentTab === 'Official' ? '#8e44ad' : '#2980b9'};">JOIN</a>`;
                }

                card.innerHTML = `
                    <div style="display:flex; align-items:center; gap:10px; flex:1; min-width:0;">
                        <div style="border:1px solid ${isPast ? '#444' : themeColor}; padding:6px; border-radius:10px; min-width:90px; text-align:center; background:rgba(255,255,255,0.02);">
                            <div style="color:${isPast ? '#666' : themeColor}; font-weight:bold; font-size:0.6rem; text-transform:uppercase;">${format12h(time)}</div>
                            <div style="color:${isPast ? '#666' : '#fff'}; font-weight:bold; font-size:0.85rem;">${displayDate}</div>
                        </div>
                        <div style="min-width:0; flex:1;">
                            <strong style="color:${isPast ? '#888' : '#fff'}; font-size:0.95rem; display:block; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">
                                ${title}${isLive ? '<span class="live-badge">LIVE</span>' : ''}
                            </strong>
                            <div style="color:${isPast ? '#666' : themeColor}; font-size:0.75rem;">Host: ${host}</div>
                        </div>
                    </div>
                    <div style="flex-shrink:0;">
                        ${joinBtnHTML}
                    </div>
                `;
                container.appendChild(card);
            });
            
            if (container.innerHTML === "") {
                 container.innerHTML = `<div class="empty-msg">NO ${currentTab.toUpperCase()} PARTIES LISTED</div>`;
            }
        }

        async function initAuthAndData() {
            if (!firebaseConfig || (!isCanvasPreview && !firebaseConfig.apiKey)) {
                document.getElementById('listContainer').innerHTML = `<div class="empty-msg" style="color:#ef4444;">ERROR: Missing Firebase Keys. Check Railway Dashboard.</div>`;
                return;
            }

            try {
                const app = initializeApp(firebaseConfig);
                const db = getFirestore(app);
                const auth = getAuth(app);

                // Use custom token in Canvas to prevent permission errors, standard fallback for production
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
                
                onSnapshot(collection(db, FIREBASE_COLLECTION_PATH), (snapshot) => {
                    allParties = snapshot.docs.map(d => d.data());
                    renderParties();
                }, (error) => {
                    console.error("Firebase Snapshot error:", error);
                    document.getElementById('listContainer').innerHTML = `<div class="empty-msg" style="color:#ef4444;">Database Permission Denied</div>`;
                });
            } catch (err) {
                console.error("Firebase Auth error:", err);
                document.getElementById('listContainer').innerHTML = `<div class="empty-msg" style="color:#ef4444;">Failed to connect to Firebase.</div>`;
            }
        }

        initAuthAndData();
    </script>
</body>
</html>

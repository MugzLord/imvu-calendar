<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMVU Party Guide</title>
    <style>
        :root {
            --vui-gold: #f1c40f;
            --vui-purple: #8e44ad;
            --community-blue: #00d4ff;
            --bg-dark: #0f0f0f;
            --card-bg: #1a1a1a;
        }

        body { 
            background-color: var(--bg-dark); 
            color: #e0e0e0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 20px;
            line-height: 1.6;
        }

        /* HEADER BOX STYLES */
        header { 
            position: relative; 
            overflow: hidden; 
            height: 160px; 
            display: flex; 
            align-items: flex-end; 
            border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); 
            margin-bottom: 20px; 
            background-color: #000;
        }

        .header-bg {
            position: absolute; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background-image: url('https://raw.githubusercontent.com/MugzLord/imvu-calendar/main/IMVU%20Party.png');
            background-size: cover; 
            background-position: center; 
            z-index: 1; 
            opacity: 0.7;
        }

        .header-overlay {
            position: absolute; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.3) 100%); 
            z-index: 2;
        }

        .header-content {
            position: relative; 
            z-index: 3; 
            width: 100%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 0 25px 15px 25px;
        }

        .header-controls { display: flex; align-items: center; gap: 20px; }

        .clock { 
            color: var(--community-blue); 
            font-weight: bold; font-size: 1.4rem; text-shadow: 0 0 10px rgba(0,212,255,0.4);
        }

        .btn-submit {
            background: linear-gradient(45deg, var(--vui-gold), #d4af37);
            color: black; border: none; padding: 10px 22px; border-radius: 25px;
            font-weight: bold; cursor: pointer; transition: 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .btn-submit:hover { transform: scale(1.05); filter: brightness(1.1); }

        /* TAB STYLES */
        .category-tabs {
            display: flex; gap: 10px; margin-bottom: 25px; padding: 0 5px;
        }

        .tab-btn {
            flex: 1;
            background: #1a1a1a;
            color: #888;
            border: 1px solid #333;
            padding: 14px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            font-size: 1rem;
        }

        .tab-btn.active {
            background: rgba(241, 196, 15, 0.1);
            color: var(--vui-gold);
            border-color: var(--vui-gold);
            box-shadow: 0 0 15px rgba(241, 196, 15, 0.2);
        }

        /* PARTY CARD STYLES - RESTORED NEATNESS */
        .party-list { display: flex; flex-direction: column; gap: 20px; }

        .party-card { 
            background: var(--card-bg); padding: 25px; border-radius: 15px; 
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid #222; position: relative;
        }

        .official-card { border-left: 6px solid var(--vui-gold); }
        .community-card { border-left: 6px solid var(--community-blue); }

        .party-info { display: flex; align-items: center; }

        .btn-join { 
            min-width: 140px;
            text-align: center;
            background: var(--vui-purple); color: white; border: none; 
            padding: 12px 24px; border-radius: 10px; text-decoration: none; 
            font-weight: bold; transition: 0.2s; cursor: pointer;
            font-size: 1.1rem;
        }
        .btn-join:hover:not([disabled]) { background: #9b59b6; transform: scale(1.02); }

        /* MOBILE NEATNESS RESTORED */
        @media (max-width: 768px) {
            header { height: 160px !important; }
            .header-content { flex-direction: column !important; gap: 10px; padding-bottom: 15px !important; }
            .header-controls { flex-direction: row !important; }
            
            .party-card { flex-direction: column !important; text-align: center; gap: 20px; padding: 20px !important; }
            .party-info { flex-direction: column !important; gap: 15px; }
            
            div[style*="min-width:90px"] { margin-right: 0 !important; }
            
            .btn-join { width: 100%; box-sizing: border-box; }
        }

        @keyframes pulse-gold {
            0% { box-shadow: 0 0 5px rgba(241, 196, 15, 0.2); }
            50% { box-shadow: 0 0 20px rgba(241, 196, 15, 0.6); border-color: var(--vui-gold); }
            100% { box-shadow: 0 0 5px rgba(241, 196, 15, 0.2); }
        }

        .live-now {
            animation: pulse-gold 2s infinite;
            background: linear-gradient(90deg, #1a1a1a 0%, #252115 100%) !important;
        }

        .live-badge {
            background: #ff0000; color: white; font-size: 0.75rem; padding: 3px 10px;
            border-radius: 5px; font-weight: bold; margin-left: 10px; vertical-align: middle;
        }

        .modal {
            display:none; position:fixed; top:0; left:0; width:100%; height:100%;
            background:rgba(0,0,0,0.9); z-index:1000; align-items:center; justify-content:center;
        }
        .modal-content {
            background:#1e1e1e; padding:30px; border-radius:15px; width:90%; max-width:400px;
            border: 1px solid #333; box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        .modal-content input, .modal-content select { 
            width:100%; margin:12px 0; padding:12px; background:#2a2a2a; 
            color:white; border:1px solid #444; border-radius: 8px; box-sizing: border-box;
        }
        .btn-post { 
            background: var(--vui-purple); color:white; width:100%; padding:14px; 
            border:none; border-radius:8px; margin-top:10px; cursor:pointer; font-weight:bold;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-bg"></div>
        <div class="header-overlay"></div>
        <div class="header-content">
            <h1 style="margin: 0; text-shadow: 2px 2px 10px rgba(0,0,0,1);">IMVU PARTY GUIDE</h1>
            <div class="header-controls">
                <div class="clock" id="ptClock">--:-- -- PT</div>
                <button class="btn-submit" onclick="toggleModal()">+ SUBMIT PARTY</button>
            </div>
        </div>
    </header>

    <div style="font-size: 0.75rem; color: #666; text-align: center; margin-bottom: 25px; font-style: italic; opacity: 0.8;">
        This is a community-run party schedule. Not an official product of IMVU Inc.
    </div>   

    <div class="category-tabs">
        <button id="tabOfficial" class="tab-btn active" onclick="switchTab('Official')">Official VUI Events ✨</button>
        <button id="tabCommunity" class="tab-btn" onclick="switchTab('Community')">Community Parties 🎧</button>
    </div>

    <div id="officialLane">
        <div id="officialList" class="party-list"></div>
    </div>

    <div id="communityLane" style="display: none;">
        <div id="communityList" class="party-list"></div>
    </div>

    <div id="modalOverlay" class="modal">
        <div class="modal-content">
            <h2 style="color:var(--vui-gold); margin-top:0;">Submit Your Party</h2>
            <select id="fCategory">
                <option value="Official">Official IMVU Event</option>
                <option value="Community">Community Party</option>
            </select>
            <input type="text" id="fTitle" placeholder="Party Title">
            <input type="text" id="fHost" placeholder="Host Name">
            <input type="date" id="fDate">
            <select id="fTime">
                <option value="12 AM">12:00 AM</option><option value="1 AM">1:00 AM</option>
                <option value="2 AM">2:00 AM</option><option value="3 AM">3:00 AM</option>
                <option value="4 AM">4:00 AM</option><option value="5 AM">5:00 AM</option>
                <option value="6 AM">6:00 AM</option><option value="7 AM">7:00 AM</option>
                <option value="8 AM">8:00 AM</option><option value="9 AM">9:00 AM</option>
                <option value="10 AM">10:00 AM</option><option value="11 AM">11:00 AM</option>
                <option value="12 PM">12:00 PM</option><option value="1 PM">1:00 PM</option>
                <option value="2 PM">2:00 PM</option><option value="3 PM">3:00 PM</option>
                <option value="4 PM">4:00 PM</option><option value="5 PM">5:00 PM</option>
                <option value="6 PM">6:00 PM</option><option value="7 PM">7:00 PM</option>
                <option value="8 PM">8:00 PM</option><option value="9 PM">9:00 PM</option>
                <option value="10 PM">10:00 PM</option><option value="11 PM">11:00 PM</option>
            </select>
            <input type="text" id="fLink" placeholder="IMVU Room Link">
            <button class="btn-post" onclick="submitParty()">POST TO CALENDAR</button>
            <button onclick="toggleModal()" style="background:none; color:#888; width:100%; border:none; margin-top:10px; cursor:pointer;">Cancel</button>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycby3SOWG_wjsR-NF6ffh6dnVHbKDxQPAAGvCb0agUsP_03ojZTQ6EUVmhkwpb1unyyNnlA/exec';

        function updateClock() {
            const now = new Date();
            const ptTime = now.toLocaleTimeString('en-US', { timeZone: 'America/Los_Angeles', hour: '2-digit', minute: '2-digit' });
            document.getElementById('ptClock').innerText = ptTime + ' PT';
        }
        setInterval(updateClock, 1000);
        updateClock();

        function switchTab(cat) {
            document.getElementById('officialLane').style.display = (cat === 'Official') ? 'block' : 'none';
            document.getElementById('communityLane').style.display = (cat === 'Community') ? 'block' : 'none';
            document.getElementById('tabOfficial').classList.toggle('active', cat === 'Official');
            document.getElementById('tabCommunity').classList.toggle('active', cat === 'Community');
        }

        function toggleModal() {
            const m = document.getElementById('modalOverlay');
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        }

        async function loadParties() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                const offDiv = document.getElementById('officialList');
                const comDiv = document.getElementById('communityList');
                offDiv.innerHTML = "";
                comDiv.innerHTML = "";

                data.forEach(p => {
                    const now = new Date();
                    const currentHour = now.toLocaleTimeString('en-US', { timeZone: 'America/Los_Angeles', hour: 'numeric', hour12: true });
                    const isLive = (currentHour === p.time.replace(':00', ''));

                    const hasLink = p.link && p.link.trim() !== "";
                    const joinBtn = hasLink 
                        ? `<a href="${p.link}" target="_blank" class="btn-join">JOIN ROOM</a>`
                        : `<button class="btn-join" style="background: #333; color: #777; border: 1px solid #444; cursor: not-allowed;" disabled>NO LINK</button>`;

                    const card = `
                        <div class="party-card ${p.category === 'Official' ? 'official-card' : 'community-card'} ${isLive ? 'live-now' : ''}">
                            <div class="party-info">
                                <div style="background:rgba(241, 196, 15, 0.05); padding:15px; border-radius:12px; border: 1px solid #f1c40f; min-width:95px; text-align:center; margin-right:30px;">
                                    <div style="color:#f1c40f; font-weight:bold; font-size:1rem; margin-bottom:6px;">${p.time}</div>
                                    <div style="color:#fff; font-weight:900; font-size:1.3rem; letter-spacing:1px; border-top:1px solid rgba(241,196,15,0.3); padding-top:6px; margin-top:6px;">${p.date}</div>
                                </div>
                                <div>
                                    <strong style="font-size: 1.5rem; color: #fff; display:block; margin-bottom:4px;">
                                        ${p.title} ${isLive ? '<span class="live-badge">LIVE NOW</span>' : ''}
                                    </strong>
                                    <small style="color: #f1c40f; opacity: 0.9; font-size:1.1rem;">Host: ${p.host}</small>
                                </div>
                            </div>
                            ${joinBtn}
                        </div>
                    `;
                    if (p.category === 'Official') offDiv.innerHTML += card;
                    else comDiv.innerHTML += card;
                });
            } catch (err) { console.log("Waiting for data..."); }
        }

        async function submitParty() {
            const payload = {
                category: document.getElementById('fCategory').value,
                title: document.getElementById('fTitle').value,
                host: document.getElementById('fHost').value,
                date: document.getElementById('fDate').value,
                time: document.getElementById('fTime').value,
                link: document.getElementById('fLink').value
            };
            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            alert("Party Submitted!");
            location.reload();
        }

        loadParties();
    </script>
</body>
</html>

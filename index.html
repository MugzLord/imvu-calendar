<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMVU Party Guide</title>
    <style>
        :root {
            --vui-gold: #f1c40f;
            --vui-purple: #8e44ad;
            --community-blue: #00d4ff;
            --bg-dark: #0f0f0f;
            --card-bg: #1a1a1a;
        }

        body { 
            background-color: var(--bg-dark); 
            color: #e0e0e0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 15px;
            line-height: 1.6;
        }

        /* --- HEADER --- */
        header { 
            position: relative; overflow: hidden; height: 160px; 
            display: flex; align-items: flex-end; border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); margin-bottom: 15px; 
            background-color: #000;
        }

        .header-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background-image: url('https://raw.githubusercontent.com/MugzLord/imvu-calendar/32c2014e93cbc5c11070d47675f5ed643ba2b3eb/Party%20Banner.jpg');
            background-size: cover; background-position: center; z-index: 1; opacity: 0.7;
        }

        .header-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.3) 100%); z-index: 2;
        }

        .header-content {
            position: relative; z-index: 3; width: 100%; 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 25px 15px 25px;
        }

        .clock { color: var(--community-blue); font-weight: bold; font-size: 1.4rem; text-shadow: 0 0 10px rgba(0,212,255,0.4); }

        .btn-submit {
            background: linear-gradient(45deg, var(--vui-gold), #d4af37);
            color: black; border: none; padding: 10px 22px; border-radius: 25px;
            font-weight: bold; cursor: pointer; transition: 0.3s;
        }

        /* --- TABS --- */
        .category-tabs { display: flex; gap: 10px; margin-bottom: 20px; }

        .tab-btn {
            flex: 1; background: #1a1a1a; color: #888; border: 1px solid #333;
            padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        
        .tab-btn.active.gold-tab {
            background: rgba(241, 196, 15, 0.1);
            color: var(--vui-gold);
            border-color: var(--vui-gold);
            box-shadow: 0 0 15px rgba(241, 196, 15, 0.2);
        }
        
        .tab-btn.active.blue-tab {
            background: rgba(0, 212, 255, 0.1);
            color: var(--community-blue);
            border-color: var(--community-blue);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
        }

        .party-list { display: flex; flex-direction: column; gap: 15px; }

        .party-card { 
            background: var(--card-bg); padding: 25px; border-radius: 15px; 
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid #222; border-left: 6px solid #444;
        }

        .official-card { border-left-color: var(--vui-gold); }
        .community-card { border-left-color: var(--community-blue); }

        .party-info { display: flex; align-items: center; gap: 25px; }

        .btn-join { 
            min-width: 130px; text-align: center; background: var(--vui-purple); 
            color: white; border: none; padding: 12px 20px; border-radius: 10px; 
            text-decoration: none; font-weight: bold; transition: 0.2s;
        }

       
        @media (max-width: 480px) {
            .chat-text { display: none; }
            .floating-chat-btn { padding: 15px; border-radius: 50%; }
        }
        @media (max-width: 768px) {
            header { height: 180px !important; display: flex !important; flex-direction: column !important; justify-content: center !important; align-items: center !important; }
            .header-content { flex-direction: column !important; align-items: center !important; gap: 5px !important; padding-bottom: 10px !important; }
            header h1 { font-size: 1.4rem !important; margin: 0 !important; text-align: center !important; }
            .header-controls { flex-direction: column !important; align-items: center !important; gap: 8px !important; }
            .clock { font-size: 1.1rem !important; white-space: nowrap !important; }
            .party-card { flex-direction: row !important; padding: 12px !important; gap: 10px !important; text-align: left !important; align-items: center !important; }
            .party-card .party-info { flex-direction: row !important; gap: 10px !important; width: 100%; }
            .party-card div[style*="min-width:90px"] { min-width: 65px !important; padding: 5px !important; }
            .party-card strong { font-size: 1rem !important; }
            .party-card small { font-size: 0.8rem !important; }
            .btn-join { min-width: 80px !important; padding: 8px 12px !important; font-size: 0.8rem !important; }
        }

        .live-badge { background: #ff0000; color: white; font-size: 0.6rem; padding: 2px 6px; border-radius: 4px; font-weight: bold; margin-left: 5px; }

        .btn-delete {
            background: none; border: 1px solid #444; color: #666; font-size: 0.6rem; padding: 2px 6px; cursor: pointer; border-radius: 4px; transition: 0.3s;
        }
        .btn-delete:hover {
            border-color: #ff4d4d !important; color: #ff4d4d !important; background: rgba(255, 77, 77, 0.1) !important;
        }

        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; align-items:center; justify-content:center; }
        .modal-content { background:#1e1e1e; padding:25px; border-radius:15px; width:90%; max-width:380px; }
        .modal-content input, .modal-content select { width:100%; margin:10px 0; padding:12px; background:#2a2a2a; color:white; border:1px solid #444; border-radius:8px; box-sizing:border-box; }
    </style>
</head>
<body>

    <header>
        <div class="header-bg"></div>
        <div class="header-overlay"></div>
        <div class="header-content">
            <h1 style="margin: 0; text-shadow: 2px 2px 10px rgba(0,0,0,1);">IMVU PARTY GUIDE</h1>
            <div class="header-controls">
                <div class="clock" id="ptClock">--:-- -- PT</div>
                <button class="btn-submit" onclick="toggleModal()">+ SUBMIT</button>
            </div>
        </div>
    </header>

    <div style="font-size: 0.7rem; color: #666; text-align: center; margin-bottom: 15px; font-style: italic; padding: 0 20px;">
        This platform is a community-led initiative for all participating parties. 
        It is an independent project and is not affiliated with, or endorsed by, IMVU Inc. in any capacity whatsoever.
    </div>

    <div class="category-tabs">
        <button id="tabOfficial" class="tab-btn active gold-tab" onclick="switchTab('Official')">Official ✨</button>
        <button id="tabCommunity" class="tab-btn blue-tab" onclick="switchTab('Community')">Community 🎧</button>
    </div>

    <div id="officialLane"><div id="officialList" class="party-list"></div></div>
    <div id="communityLane" style="display: none;"><div id="communityList" class="party-list"></div></div>

    <div id="modalOverlay" class="modal">
        <div class="modal-content">
            <h2 style="color:var(--vui-gold); margin-top:0;">Submit Party</h2>
            <select id="fCategory">
                <option value="Official">Official IMVU Event</option>
                <option value="Community">Community Party</option>
            </select>
            <input type="text" id="fTitle" placeholder="Party Title">
            <input type="text" id="fHost" placeholder="Host/s">
            <input type="date" id="fDate">
            <select id="fTime">
                <option value="12 AM">12:00 AM</option><option value="1 AM">1:00 AM</option>
                <option value="2 AM">2:00 AM</option><option value="3 AM">3:00 AM</option>
                <option value="4 AM">4:00 AM</option><option value="5 AM">5:00 AM</option>
                <option value="6 AM">6:00 AM</option><option value="7 AM">7:00 AM</option>
                <option value="8 AM">8:00 AM</option><option value="9 AM">9:00 AM</option>
                <option value="10 AM">10:00 AM</option><option value="11 AM">11:00 AM</option>
                <option value="12 PM">12:00 PM</option><option value="1 PM">1:00 PM</option>
                <option value="2 PM">2:00 PM</option><option value="3 PM">3:00 PM</option>
                <option value="4 PM">4:00 PM</option><option value="5 PM">5:00 PM</option>
                <option value="6 PM">6:00 PM</option><option value="7 PM">7:00 PM</option>
                <option value="8 PM">8:00 PM</option><option value="9 PM">9:00 PM</option>
                <option value="10 PM">10:00 PM</option><option value="11 PM">11:00 PM</option>
            </select>
            <input type="text" id="fLink" placeholder="Room Link">
            <button class="btn-submit" style="width:100%; border-radius:8px; padding:12px;" onclick="submitParty()">POST PARTY</button>
            <button onclick="toggleModal()" style="background:none; color:#888; width:100%; border:none; margin-top:10px; cursor:pointer;">Cancel</button>
        </div>
    </div>

    <script>
            const API_URL = 'https://script.google.com/macros/s/AKfycbzxElJjHds9vP0dCkvdKKF1Vs47FEhSuDdotx_1OlS3jzv-1piqira1xrBXQIflnAafEQ/exec';
            
            // 1. CLOCK LOGIC
            function updateClock() {
                const now = new Date();
                const ptTime = now.toLocaleTimeString('en-US', { timeZone: 'America/Los_Angeles', hour: '2-digit', minute: '2-digit' });
                const clockEl = document.getElementById('ptClock');
                if(clockEl) clockEl.innerText = ptTime + ' PT';
            }
            setInterval(updateClock, 1000);
            updateClock();
            
            // 2. UI LOGIC
            function switchTab(cat) {
                document.getElementById('officialLane').style.display = (cat === 'Official') ? 'block' : 'none';
                document.getElementById('communityLane').style.display = (cat === 'Community') ? 'block' : 'none';
                document.getElementById('tabOfficial').classList.toggle('active', cat === 'Official');
                document.getElementById('tabCommunity').classList.toggle('active', cat === 'Community');
            }
            
            function toggleModal() {
                const m = document.getElementById('modalOverlay');
                const isOpening = m.style.display !== 'flex';
                
                m.style.display = isOpening ? 'flex' : 'none';
                
                // Reset form if closing or opening a fresh "Submit"
                if (!isOpening) {
                    window.editingID = null;
                    document.getElementById('fTitle').value = "";
                    document.getElementById('fHost').value = "";
                    document.getElementById('fLink').value = "";
                    document.getElementById('fDate').value = "";
                    document.querySelector('.btn-submit').innerText = "POST PARTY";
                }
            }
            
            // --- UPDATED EDIT LOGIC ---
            
            // 1. Fixed openEdit to map all sheet columns correctly
            function openEdit(id, title, host, link, category, date, time) {
                window.editingID = id;
                
                // Set form values
                document.getElementById('fCategory').value = category;
                document.getElementById('fTitle').value = title;
                document.getElementById('fHost').value = host;
                document.getElementById('fLink').value = link;
                document.getElementById('fTime').value = time;
            
                // Date Handling: Convert "14-Mar" format from sheet to "2026-03-14" for HTML input
                if (date) {
                    const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
                    const parts = date.split('-'); // ["14", "Mar"]
                    const day = parts[0].padStart(2, '0');
                    const month = (monthNames.indexOf(parts[1]) + 1).toString().padStart(2, '0');
                    document.getElementById('fDate').value = `2026-${month}-${day}`;
                }
            
                // Show Modal & Update Button Text
                const m = document.getElementById('modalOverlay');
                m.style.display = 'flex';
                document.querySelector('#modalOverlay .btn-submit').innerText = "UPDATE MY PARTY";
            }
            
            // 2. Updated Card Generation (Inside loadParties loop)
            // Ensure this specific line replaces your old editBtn variable:
            const editBtn = canEdit ? `
                <div style="margin-top:8px; display:flex; gap:5px;">
                    <button onclick="openEdit('${p.submissionID}', '${p.title.replace(/'/g, "\\'")}', '${p.host.replace(/'/g, "\\'")}', '${p.link}', '${p.category}', '${p.date}', '${p.time}')" 
                            style="background:none; border:1px solid #444; color:#666; font-size:0.6rem; padding:2px 6px; cursor:pointer; border-radius:4px;">
                        EDIT
                    </button>
                    <button onclick="deleteParty('${p.submissionID}')" class="btn-delete">
                        DELETE
                    </button>
                </div>` : '';
            
            // 3. Clear form when modal closes
            function toggleModal() {
                const m = document.getElementById('modalOverlay');
                const isOpening = m.style.display !== 'flex';
                m.style.display = isOpening ? 'flex' : 'none';
                
                if (!isOpening) {
                    window.editingID = null;
                    document.getElementById('fTitle').value = "";
                    document.getElementById('fHost').value = "";
                    document.getElementById('fLink').value = "";
                    document.getElementById('fDate').value = "";
                    document.querySelector('#modalOverlay .btn-submit').innerText = "POST PARTY";
                }
            }
            
            async function deleteParty(id) {
                if (!confirm("Are you sure you want to delete this party?")) return;
                try {
                    await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "delete", submissionID: id }) });
                    alert("Deleted.");
                    location.reload();
                } catch (err) { alert("Error deleting."); }
            }
            
            // 3. LOAD & SORT PARTIES
            async function loadParties() {
                try {
                    const response = await fetch(API_URL);
                    let data = await response.json();
            
                    data.sort((a, b) => new Date(a.date + "-2026 " + a.time) - new Date(b.date + "-2026 " + b.time));
            
                    const offDiv = document.getElementById('officialList');
                    const comDiv = document.getElementById('communityList');
                    offDiv.innerHTML = ""; comDiv.innerHTML = "";
            
                    const myKeys = JSON.parse(localStorage.getItem('vui_keys') || "[]");
                    const ptNowStr = new Date().toLocaleString("en-US", {timeZone: "America/Los_Angeles"});
                    const ptNow = new Date(ptNowStr);
            
                    data.forEach(p => {
                        const eventTime = new Date(p.date + "-2026 " + p.time);
                        const midnightPT = new Date(p.date + "-2026 11:59:59 PM");
                        if (ptNow > midnightPT) return; 
            
                        const isPast = ptNow > eventTime;
                        const currentHourStr = ptNow.toLocaleTimeString('en-US', { hour: 'numeric', hour12: true });
                        const isLive = (currentHourStr === p.time.replace(':00', '')) && !isPast;
            
                        let calLink = "";
                        if(!isPast) {
                            try {
                                const eventEnd = new Date(eventTime.getTime() + (60 * 60 * 1000));
                                const fmt = (d) => d.toISOString().replace(/-|:|\.\d\d\d/g, "");
                                const gCalUrl = `https://www.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(p.title)}&dates=${fmt(eventTime)}/${fmt(eventEnd)}&details=${encodeURIComponent("Host: "+p.host)}&location=${encodeURIComponent(p.link)}`;
                                calLink = `<a href="${gCalUrl}" target="_blank" style="text-decoration:none; margin-left:8px; font-size:1rem; opacity:0.6;">📅</a>`;
                            } catch(e) {}
                        }
            
                        const isOfficial = (p.category === 'Official');
                        const themeColor = isPast ? '#444' : (isOfficial ? '#f1c40f' : '#00d4ff');
                        const themeBg = isPast ? 'rgba(50, 50, 50, 0.1)' : (isOfficial ? 'rgba(241, 196, 15, 0.1)' : 'rgba(0, 212, 255, 0.1)');
                        const btnColor = isPast ? '#222' : (isOfficial ? '#8e44ad' : '#2980b9');
            
                        const canEdit = p.submissionID && myKeys.includes(p.submissionID);
                        
                        // Pass all variables into openEdit
                        const editBtn = canEdit ? `<div style="margin-top:8px; display:flex; gap:5px;"><button onclick="openEdit('${p.submissionID}', '${p.title.replace(/'/g, "\\'")}', '${p.host.replace(/'/g, "\\'")}', '${p.link}', '${p.category}', '${p.date}', '${p.time}')" style="background:none; border:1px solid #444; color:#666; font-size:0.6rem; padding:2px 6px; cursor:pointer; border-radius:4px;">EDIT</button><button onclick="deleteParty('${p.submissionID}')" class="btn-delete">DELETE</button></div>` : '';
            
                        const card = `
                            <div class="party-card ${isOfficial ? 'official-card' : 'community-card'} ${isLive ? 'live-now' : ''}" style="opacity: ${isPast ? '0.4' : '1'}; border-left-color: ${isPast ? '#333' : ''}">
                                <div class="party-info">
                                    <div class="time-box" style="background:${themeBg}; padding:10px; border-radius:10px; border: 1px solid ${themeColor}; min-width:90px; text-align:center;">
                                        <div style="color:${themeColor}; font-weight:bold; font-size:0.9rem;">${p.time}</div>
                                        <div style="color:${isPast ? '#666' : '#fff'}; font-weight:900; font-size:1.1rem; border-top:1px solid rgba(255,255,255,0.1); padding-top:4px; margin-top:4px;">${p.date}</div>
                                    </div>
                                    <div>
                                        <strong style="color: ${isPast ? '#666' : '#fff'};">${p.title} ${isLive ? '<span class="live-badge">LIVE</span>' : ''} ${calLink}</strong>
                                        <small style="color: ${themeColor}; display:block;">Host/s: ${p.host}</small>
                                        ${editBtn}
                                    </div>
                                </div>
                                ${p.link ? `<a href="${p.link}" target="_blank" class="btn-join" style="background:${btnColor}">${isPast ? 'ENDED' : 'JOIN'}</a>` : `<button class="btn-join" disabled style="background:#333;">NO LINK</button>`}
                            </div>
                        `;
                        if (isOfficial) offDiv.innerHTML += card;
                        else comDiv.innerHTML += card;
                    });
                } catch (err) { console.error("Load failed:", err); }
            }
            
            // 4. SUBMIT LOGIC
            async function submitParty() {
                const btn = document.querySelector('.btn-submit');
                if (btn.disabled) return;
                const myID = window.editingID || 'ID-' + Math.random().toString(36).substr(2, 9);
                btn.innerText = "POSTING...";
                btn.disabled = true;
            
                const payload = {
                    category: document.getElementById('fCategory').value,
                    title: document.getElementById('fTitle').value,
                    host: document.getElementById('fHost').value,
                    date: document.getElementById('fDate').value,
                    time: document.getElementById('fTime').value,
                    link: document.getElementById('fLink').value,
                    submissionID: myID
                };
            
                try {
                    await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                    
                    let currentKeys = JSON.parse(localStorage.getItem('vui_keys') || "[]");
                    if (!currentKeys.includes(myID)) {
                        currentKeys.push(myID);
                        localStorage.setItem('vui_keys', JSON.stringify(currentKeys));
                    }
                    location.reload();
                } catch (err) {
                    alert("Error submitting.");
                    btn.disabled = false;
                    btn.innerText = "POST PARTY";
                }
            }
            
            loadParties();
  
        </script>

    <footer style="margin-top: 50px; padding: 30px 10px; border-top: 1px solid #222; text-align: center; color: #444; font-size: 0.8rem;">
        <div style="letter-spacing: 2px; text-transform: uppercase; font-weight: bold; margin-bottom: 5px; color: #666;">
            © 2026 VU Influencer Team
        </div>
        <div style="opacity: 0.6;">
            Designed for the IMVU Community
        </div>
    </footer>

  </body>
</html>
